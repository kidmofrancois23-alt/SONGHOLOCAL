<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sôngho Pro - Édition Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <h2>SÔNGHO PRO - ÉDITION VISUELLE</h2>
        
        <div id="status-panel">
            <div class="status-item">
                Statut : <span id="game-status" class="badge progress-badge">En cours</span>
            </div>
            <div class="status-item">
                Tour : <span id="tour-count">1</span>
            </div>
            <div class="status-item">
                <label for="start-player-select">Début :</label>
                <select id="start-player-select">
                    <option value="2" selected>Joueur 2 (Haut)</option>
                    <option value="1">Joueur 1 (Bas)</option>
                    <option value="random">Aléatoire 🎲</option>
                </select>
            </div>
            <div id="turn-indicator">Initialisation...</div>
        </div>
        
        <div id="notification"></div>

        <div id="board">
            <div class="row row-j2">
                <div class="hole" data-index="13"></div>
                <div class="hole" data-index="12"></div>
                <div class="hole" data-index="11"></div>
                <div class="hole" data-index="10"></div>
                <div class="hole" data-index="9"></div>
                <div class="hole" data-index="8"></div>
                <div class="hole" data-index="7"></div>
            </div>

            <div class="row row-j1">
                <div class="hole" data-index="0"></div>
                <div class="hole" data-index="1"></div>
                <div class="hole" data-index="2"></div>
                <div class="hole" data-index="3"></div>
                <div class="hole" data-index="4"></div>
                <div class="hole" data-index="5"></div>
                <div class="hole" data-index="6"></div>
            </div>
        </div>

        <div id="scores">
            <div class="score-box J2">
                <h3>Joueur 2 (Haut)</h3>
                <p><span id="score-j2">0</span> graines</p>
            </div>
            <div class="score-box J1">
                <h3>Joueur 1 (Bas)</h3>
                <p><span id="score-j1">0</span> graines</p>
            </div>
        </div>

        <div id="log-container">
            <h3>Historique de la partie</h3>
            <div id="game-logs"></div>
        </div>
        
        <button id="reset-btn">Réinitialiser la partie</button>
    </div>

    <div id="victory-modal">
        <div class="modal-content">
            <h2 id="winner-name">🏆 JOUEUR X GAGNE !</h2>
            <div class="stats-list">
                <p>⏱️ Tours joués : <span id="stat-tours">0</span></p>
                <p>💎 Score du vainqueur : <span id="stat-score">0</span> graines</p>
                <p>⚡ Record de capture : <span id="stat-record">0</span> pions d'un coup</p>
            </div>
            <button id="revanch-btn">PRENDRE MA REVANCHE 🔄</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
